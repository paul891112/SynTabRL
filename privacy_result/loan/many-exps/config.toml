seed = 1
parent_dir = "privacy_result/loan/many-exps/19"
real_data_path = "data/loan/"
model_type = "mlp"
num_numerical_features = 8
device = "cuda:0"

[model_params]
num_classes = 2
is_y_cond = true

[model_params.rtdl_params]
d_layers = [
    512,
    512,
    512,
    1024,
]
dropout = 0.0

[diffusion_params]
num_timesteps = 1000
gaussian_loss_type = "mse"
scheduler = "cosine"

[train.main]
steps = 30000
lr = 0.0007314414694765109
weight_decay = 0.0
batch_size = 4096
evaluation_file = "SynTabRL_eval.json"
pretrain_steps = 4000
privacy_discount = 0.01
logsumexp_sigma = 0.01

[train.T]
seed = 0
normalization = "quantile"
num_nan_policy = "__none__"
cat_nan_policy = "__none__"
cat_min_frequency = "__none__"
cat_encoding = "__none__"
y_policy = "default"

[sample]
num_samples = 57600
batch_size = 10000
seed = 4

[eval.type]
eval_model = "catboost"
eval_type = "synthetic"

[eval.T]
seed = 0
normalization = "__none__"
num_nan_policy = "__none__"
cat_nan_policy = "__none__"
cat_min_frequency = "__none__"
cat_encoding = "__none__"
y_policy = "default"

[privacy_config]
dcr = 0.2
nndr = 0.85
gower = 0.1
